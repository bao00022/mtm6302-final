<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wikimedia Picture of the day</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <div class="overlay" aria-hidden="true"></div>
      <header role="header">
        <h1>Wikimedia Picture of the Day</h1>
        <div class="input">
          <input type="date" aria-label="Select date for featured picture" />
        </div>
      </header>

      <main role="main">
        <div class="banner" role="banner" aria-label="Featured picture"></div>

        <div
          class="myFavorites"
          role="region"
          aria-labelledby="favoritesHeading"
        >
          <div class="favoritesTitle">
            <h2>My Favorites</h2>
            <button id="allBtn" aria-label="View all favorites">
              View All
            </button>
          </div>
          <div class="favoritePictures"></div>
        </div>
      </main>

      <footer role="contentinfo">
        <p>Images courtesy of Wikimedia's API.</p>
        <p>©2025 Yan Bao. All rights reserved.</p>
      </footer>
    </div>

    <script src="index.js"></script>
  </body>
</html>
